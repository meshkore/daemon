# MeshKore Quality Gates — L2 — Python
# meshkore-quality-gates: v1
# stack: python

name: meshkore/quality-gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Install project deps (if any)
        run: |
          if [ -f pyproject.toml ]; then pip install --quiet -e . || true; fi
          if [ -f requirements.txt ]; then pip install --quiet -r requirements.txt; fi

      - name: Format check
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      - name: Test
        run: |
          if [ -d tests ] || ls -1 test_*.py 2>/dev/null | head -1 | grep -q .; then
            pip install --quiet pytest
            pytest -q
          else
            echo "no tests; skipping"
          fi

      - name: Secrets scan (basic patterns)
        run: |
          ! git log -p | grep -P '(?<![A-Za-z0-9_])(AIza[A-Za-z0-9_-]{30,}|r8_[A-Za-z0-9]{30,}|sk-[A-Za-z0-9_-]{30,}|ghp_[A-Za-z0-9]{30,}|xoxb-[A-Za-z0-9-]{30,})'
